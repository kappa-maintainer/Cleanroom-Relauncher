config.use_local_pack = When enabled, uses the specified local MMC pack zip. If no path is specified, falls back to cached or bundled pack. When disabled, always downloads latest from remote ignoring any cached pack.
config.local_pack_path = Path to a local Cleanroom MMC pack zip file. Leave empty to use the bundled pack.
config.proxy_addr = Proxy address
config.proxy_port = Proxy Port
config.java_path = Path to javaw.exe or java binary
config.jvm_args = Arguments for Java JVM
config.respect_library_structure = Put library files under directory of their group name
config.library_path = Library path, you may point it to launcher's library path for re-using, empty for default relauncher/
config.max_retry = Maximum attempts on downloading file.
config.max_download_session = Maximum session count when downloading multiple files.
config.chinese_mode = Use mirror and proxy that makes downloading from Chinese main land faster.
config.show_config_gui = Whether to show the config GUI on startup. Set to false after first successful launch. \u00a7lReset to update Cleanroom.\u00a7r
config.always_show_config = When enabled, always show the config GUI regardless of other settings
config.class_path = Class path used to launch
config.disable_update_toast = Whether to disable the update toast notification shown on the main menu.

